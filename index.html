<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARITA PHOTO - Professional Photography Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="customHeader">
        <div class="container header-flex">
            <div class="logo">
                <span class="logo-text">SARITA PHOTO</span>
            </div>
            
            <nav class="for-pc">
                <a href="#hero" class="sub-menu">होम</a>
                <a href="#features" class="sub-menu">फ़ीचर्स</a>
                <a href="#portfolio" class="sub-menu">पोर्टफोलियो</a>
                <a href="#about" class="sub-menu">हमारे बारे में</a>
            </nav>

            <div class="btn-group">
                <button class="iconed-button-alt">लॉगिन</button>
                <button class="secondaryButton">साइनअप</button>
            </div>
        </div>
    </header>

    <section class="introduce-section" id="hero">
        <div class="container hero-container">
            <div class="business-bordered-text">Welcome to Bikaner's Premium Studio</div>
            <h1>SARITA PHOTO</h1>
            <p class="owner-text">Owner: Manoj Kumar Panwar</p>
            <p class="description">
                हम आपके जीवन के सबसे खूबसूरत और अनमोल पलों को अत्याधुनिक AI फेस रेकग्निशन टेक्नोलॉजी और प्रोफेशनल फोटोग्राफी के ज़रिए सहेजने में मदद करते हैं।
            </p>
            <div class="hero-btns">
                <button class="secondaryButton big-btn">गैलरी देखें</button>
                <button class="iconed-button-alt big-btn">संपर्क करें</button>
            </div>
        </div>
    </section>

</body>
</html>
